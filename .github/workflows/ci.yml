name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check and build
        working-directory: frontend
        run: npm run build

  docker-publish:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build backend frontend

      - name: Push to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker tag counterfeit-backend "ghcr.io/$REPO/netra-backend:latest"
          docker tag counterfeit-frontend "ghcr.io/$REPO/netra-frontend:latest"
          docker push "ghcr.io/$REPO/netra-backend:latest"
          docker push "ghcr.io/$REPO/netra-frontend:latest"

  deploy:
    runs-on: ubuntu-latest
    needs: docker-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          if [ -n "$RENDER_SERVICE_ID" ] && [ -n "$RENDER_API_KEY" ]; then
            curl -fsS -X POST "https://api.render.com/deploy/srv-$RENDER_SERVICE_ID?key=$RENDER_API_KEY"
          else
            echo "Render secrets not configured; skipping deploy."
          fi
